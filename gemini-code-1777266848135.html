<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ShiftWise — Know Your Real Pay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
/* ... (Styles from original preserved for branding) ... */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f; --bg2:#111118; --bg3:#18181f; --card:#1c1c26; --card2:#222230;
  --border:#2a2a3a; --border2:#363650; --green:#00e676; --green2:#00c853;
  --green-dim:#003d1a; --amber:#ffb300; --red:#ff5252; --t1:#f0f0ff; --t2:#9898b8;
  --t3:#55556a; --ff:'Outfit',sans-serif; --fh:'Bebas Neue',sans-serif;
}
body{background:var(--bg);color:var(--t1);font-family:var(--ff);min-height:100vh}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,15,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-logo{font-family:var(--fh);font-size:26px;color:var(--green);cursor:pointer}
.nav-links{display:flex;gap:4px}
.nav-btn{background:none;border:none;color:var(--t2);padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:500}
.nav-btn.active{color:var(--green);background:var(--green-dim)}
main{max-width:1100px;margin:80px auto 40px;padding:0 1.5rem}
.section{display:none}
.section.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
.btn{padding:11px 20px;border-radius:8px;font-weight:600;cursor:pointer;border:none;transition:0.15s}
.btn-green{background:var(--green);color:#000}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--t1)}
input, select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--t1);padding:10px;margin-bottom:10px}
.goal-prog-wrap{background:var(--bg3);border-radius:999px;height:10px;overflow:hidden;margin:10px 0}
.goal-prog-bar{height:100%;background:var(--green);transition:width 0.5s ease}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--card);padding:2rem;border-radius:20px;width:400px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--t3);padding:10px}
td{padding:10px;border-bottom:1px solid var(--border)}
</style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="showSection('home')">SHIFT<span>WISE</span></div>
  <div class="nav-links">
    <button class="nav-btn" onclick="showSection('calc')">Calculator</button>
    <button class="nav-btn" onclick="showSection('goals')">Goals</button>
    <button class="nav-btn" onclick="showSection('sched')">Schedule</button>
    <button class="nav-btn" onclick="showSection('log')">Work Log</button>
  </div>
</nav>

<main>
  <section id="sec-calc" class="section">
    <h2 style="font-family:var(--fh); font-size:32px; margin-bottom:20px;">HOURS CALCULATOR</h2>
    <div class="card">
      <label>Hourly Rate</label>
      <input type="number" id="c-rate" value="20">
      <label>State</label>
      <select id="c-state"></select>
      <label>Take-Home Goal ($)</label>
      <input type="number" id="c-target" placeholder="e.g. 1000">
      <button class="btn btn-green" style="width:100%" onclick="runCalc()">Calculate Hours</button>
    </div>
    <div id="calc-result" class="card" style="display:none; border-color:var(--green)">
      <h3 id="r-hours" style="color:var(--green); font-size: 2.5rem; font-family:var(--fh);"></h3>
      <p id="r-details" style="font-size:13px; color:var(--t2); margin-bottom:15px;"></p>
      <button class="btn btn-outline" style="width:100%" onclick="openLogModal('calculator')">Log this as a Shift</button>
    </div>
  </section>

  <section id="sec-goals" class="section">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-family:var(--fh); font-size:32px;">YOUR GOALS</h2>
        <button class="btn btn-green" onclick="openGoalModal()">+ New Goal</button>
    </div>
    <div id="goals-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:15px;"></div>
  </section>

  <section id="sec-sched" class="section">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-family:var(--fh); font-size:32px;">SCHEDULE</h2>
        <button class="btn btn-green" onclick="openJobModal()">+ Add Job</button>
    </div>
    <div id="jobs-list"></div>
  </section>

  <section id="sec-log" class="section">
    <h2 style="font-family:var(--fh); font-size:32px; margin-bottom:20px;">WORK LOG</h2>
    <div class="card" style="overflow-x:auto">
        <table>
            <thead><tr><th>Date</th><th>Job</th><th>Hours</th><th>Gross</th><th>Take-Home</th><th>Goal</th></tr></thead>
            <tbody id="log-tbody"></tbody>
        </table>
    </div>
  </section>
</main>

<div class="overlay" id="log-modal">
  <div class="modal">
    <h3 style="margin-bottom:15px">Confirm Log</h3>
    <label>Apply money to goal:</label>
    <select id="ls-goal"><option value="">General Savings</option></select>
    <div class="modal-actions" style="display:flex; gap:10px; margin-top:20px">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('log-modal')">Cancel</button>
      <button class="btn btn-green" style="flex:1" onclick="confirmLog()">Log Shift</button>
    </div>
  </div>
</div>

<script>
// --- VERIFIED 2026 STATE RATES ---
const STATE_TAX = { 
    NC: 0.0399, KY: 0.04, IN: 0.03, IA: 0.038, LA: 0.03, MS: 0.044, 
    MO: 0.047, NE: 0.052, NH: 0, SC: 0.06, WV: 0.0482, ID: 0.053, MD: 0.065,
    TX: 0, FL: 0, WA: 0, NV: 0, CA: 0.093, NY: 0.0585
};

let jobs = JSON.parse(localStorage.getItem('sw-jobs') || '[]');
let goals = JSON.parse(localStorage.getItem('sw-goals') || '[]');
let shifts = JSON.parse(localStorage.getItem('sw-shifts') || '[]');

let logState = { source: null, data: null };

function save(){ 
    localStorage.setItem('sw-jobs', JSON.stringify(jobs));
    localStorage.setItem('sw-goals', JSON.stringify(goals));
    localStorage.setItem('sw-shifts', JSON.stringify(shifts));
}

// --- ENGINE: UNIFIED PROCESSING ---
function processShift(source, jobId, hours, rate, state, goalId) {
    const gross = hours * rate;
    const taxRate = (STATE_TAX[state] || 0) + 0.0765 + 0.12; // State + FICA + Est Fed
    const net = gross * (1 - taxRate);
    
    const newShift = {
        id: Date.now() + Math.random(),
        date: new Date().toISOString().split('T')[0],
        jobName: source === 'calculator' ? 'Calculator' : jobs.find(j => j.id === jobId).name,
        hours, gross, net, goalId
    };

    shifts.unshift(newShift);
    
    if(goalId) {
        let goal = goals.find(g => g.id == goalId);
        if(goal) goal.saved += net;
    }
    save();
}

// --- CALCULATOR ---
function runCalc() {
    const rate = parseFloat(document.getElementById('c-rate').value);
    const target = parseFloat(document.getElementById('c-target').value);
    const state = document.getElementById('c-state').value;
    
    const taxRate = (STATE_TAX[state] || 0) + 0.0765 + 0.12;
    const hours = target / (rate * (1 - taxRate));
    
    document.getElementById('r-hours').innerText = hours.toFixed(1) + " Hours";
    document.getElementById('r-details').innerText = `To hit $${target} take-home in ${state} at $${rate}/hr`;
    document.getElementById('calc-result').style.display = 'block';
    
    logState.data = { hours, rate, state };
}

function openLogModal(source, jobId = null) {
    logState.source = source;
    if(jobId) logState.jobId = jobId;
    
    const sel = document.getElementById('ls-goal');
    sel.innerHTML = '<option value="">General Savings</option>' + 
        goals.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
    
    document.getElementById('log-modal').classList.add('open');
}

function confirmLog() {
    const goalId = document.getElementById('ls-goal').value;
    
    if(logState.source === 'calculator') {
        processShift('calculator', null, logState.data.hours, logState.data.rate, logState.data.state, goalId);
    } else {
        const job = jobs.find(j => j.id === logState.jobId);
        const totalH = job.days.reduce((a, b) => a + b, 0);
        processShift('job', job.id, totalH, job.rate, job.state, goalId);
        job.days = [0,0,0,0,0,0,0]; // Reset schedule after logging
    }
    
    closeModal('log-modal');
    showSection('log');
}

// --- RENDERING ---
function renderGoals() {
    const grid = document.getElementById('goals-grid');
    grid.innerHTML = goals.map(g => {
        const pct = Math.min(100, (g.saved / g.target) * 100);
        return `
            <div class="card">
                <h3>${g.name}</h3>
                <div class="goal-prog-wrap"><div class="goal-prog-bar" style="width:${pct}%"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <span>$${g.saved.toFixed(2)}</span>
                    <span>Goal: $${g.target}</span>
                </div>
            </div>
        `;
    }).join('');
}

function renderLog() {
    const tbody = document.getElementById('log-tbody');
    tbody.innerHTML = shifts.map(s => `
        <tr>
            <td>${s.date}</td>
            <td>${s.jobName}</td>
            <td>${s.hours.toFixed(1)}</td>
            <td>$${s.gross.toFixed(2)}</td>
            <td style="color:var(--green)">$${s.net.toFixed(2)}</td>
            <td>${s.goalId ? goals.find(g => g.id == s.goalId)?.name : '—'}</td>
        </tr>
    `).join('');
}

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-' + id).classList.add('active');
    if(id === 'goals') renderGoals();
    if(id === 'log') renderLog();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Init
window.onload = () => {
    const sel = document.getElementById('c-state');
    Object.keys(STATE_TAX).forEach(s => sel.innerHTML += `<option value="${s}">${s}</option>`);
    showSection('calc');
};
</script>
</body>
</html>
